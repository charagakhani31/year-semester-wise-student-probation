<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="/app.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <title>Student-Probabtion</title>
  <style>

    h1 {
        display: flex;
        justify-content: center;
    }
    .year {
        margin-left: 40px;
        display: flex;
        gap: 20px;
    }
    
    .semester {
        margin-left: 40px;
        display: flex;
        gap: 20px;
    }
    .year h3:hover {
        background-color: #2ECC71; 
    }

    .semester h3:hover {
        background-color: #2ECC71; 
    }

    .active {
    background-color: #2ECC71;
    color: white;
}

    .table table {
      border-collapse: collapse;
      margin-top: 15px;
    }
    .table th, .table td {
      border: 1px solid #808080;
      padding: 8px;
      text-align: left;
    }
    .table th {
      background-color: #f2f2f2;
    }

  </style>
</head>

<body x-data="App()" x-init="getYear()">

    <h1>Year and Semester-wise Students on Probation</h1>

    <div class="year">
        <template x-for="y in year" :key="y.year">
            <h3 x-text="y.year" @click="getSemester(y.year)"
            :class="{ active: selectedYear == y.year }" ></h3>
        </template>
    </div> 

    <div class="semester">
        <template x-for="s in semester" :key="s.semester">
            <h3 x-text="s.semester" @click="getProbation(s.semester)"
            :class="{ active: selectedSemester == s.semester }"></h3>
        </template>
    </div>
    
    <div class="probation">
        <table class="table" x-show="showTable">
            <thead>
            <tr>
                <th>Reg No</th>
                <th>Student Name</th>
                <th>Year</th>
                <th>Semester</th>
                <th>Semester_GPA</th>
            </tr>
            </thead>

        <tbody>
        <template x-for="prob in probation" :key="prob.regno">
            <tr>
                <td x-text="prob.regno"></td>
                <td x-text="prob.name"></td>
                <td x-text="prob.year"></td>
                <td x-text="prob.semester"></td>
                <td x-text="prob.semester_gpa"></td>
            </tr>
        </template>
        </tbody>
        </table>
    </div>
</body>
</html>
